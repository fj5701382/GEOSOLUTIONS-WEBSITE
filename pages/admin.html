<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Geosolution Educational Services</title>
  <meta name="description" content="Geosolution Educational Services Admin Dashboard" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="admin-page">

<div class="admin-wrapper">

  <!-- ADMIN HEADER -->
  <header class="admin-header">
    <div class="container">
      <div class="admin-header-inner">
        <div class="admin-logo">
          <a href="index.html" class="nav-logo">
           <img src="../images/logo.jpg" alt="Geo Academy Logo" class="geo-logo-img" style="height:200px;width:auto;display:inline-block;vertical-align:middle;margin-right:0px;">

          </a>
        </div>
        <div style="display:flex;align-items:center;gap:.75rem">
          <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <button class="btn btn-outline btn-sm" onclick="adminLogout()" style="display:flex;align-items:center;gap:.4rem">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- ADMIN CONTENT -->
  <main class="admin-main">
    <div class="container">
      <div class="tabs">

        <!-- Tab List -->
        <div class="tab-list">
          <button class="tab-btn active" data-tab="tab-registrations">Registrations</button>
          <button class="tab-btn" data-tab="tab-messages">Messages</button>
        </div>

        <!-- Registrations Tab -->
        <div id="tab-registrations" class="tab-panel active">
          <div class="table-wrap">
            <div class="table-toolbar">
              <div class="table-toolbar-left">
                <h2>All Registrations</h2>
                <span class="badge badge-muted" id="regCount">0</span>
              </div>
              <div class="search-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
<input type="text" id="regSearch" class="form-control" placeholder="Search name or service..." style="height:2.4rem;padding-left:2.25rem;width:100%;max-width:280px" />
              </div>
            </div>
            <div>
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Service</th>
                    <th>Payment</th>
                  </tr>
                </thead>
                <tbody id="regTableBody">
                  <tr><td colspan="6" class="table-loading">Loading registrations...</td></tr>
                </tbody>
              </table>
            </div>
            <div id="regEmpty" class="table-empty" style="display:none">No registrations found.</div>
          </div>
        </div>

        <!-- Messages Tab -->
        <div id="tab-messages" class="tab-panel">
          <div class="table-wrap">
            <div class="table-toolbar">
              <div class="table-toolbar-left">
                <h2>Contact Messages</h2>
                <span class="badge badge-muted" id="msgCount">0</span>
              </div>
              <div class="search-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
<input type="text" id="msgSearch" class="form-control" placeholder="Search name..." style="height:2.4rem;padding-left:2.25rem;width:100%;max-width:280px" />
              </div>
            </div>
            <div>
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Message</th>
                  </tr>
                </thead>
                <tbody id="msgTableBody">
                  <tr><td colspan="4" class="table-loading">Loading messages...</td></tr>
                </tbody>
              </table>
            </div>
            <div id="msgEmpty" class="table-empty" style="display:none">No messages found.</div>
          </div>
        </div>

      </div>
    </div>
  </main>

</div>

<script src="../js/main.js"></script>
</body>
</html>
